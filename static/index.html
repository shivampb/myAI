<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Shiva — Research &amp; Study AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=3" />
</head>

<body>

  <div class="app-wrapper">
    <header class="topbar">
      <button class="topbar-btn" id="sidebarToggle">☰</button>
      <span class="topbar-title">Shiva</span>
      <button class="topbar-btn" id="newChatBtn">＋</button>
    </header>

    <div class="messages-area" id="messagesContainer">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-logo">🤓</div>
        <h1 class="welcome-title">Kem chho, yaar?</h1>
        <p class="welcome-subtitle">Kuch bhi pooch — research, study, ya general doubts 😊</p>
        <div class="suggestion-grid">
          <button class="suggestion-card" data-prompt="What is machine learning and how does it work?"><span
              class="card-icon">🧠</span><span class="card-text">Machine Learning explain kar</span></button>
          <button class="suggestion-card" data-prompt="Explain the difference between RAM and ROM simply."><span
              class="card-icon">💻</span><span class="card-text">RAM vs ROM — samjhav bhai</span></button>
          <button class="suggestion-card" data-prompt="What are the best study techniques for students?"><span
              class="card-icon">📚</span><span class="card-text">Best study techniques?</span></button>
          <button class="suggestion-card" data-prompt="How does the internet work in simple terms?"><span
              class="card-icon">🌐</span><span class="card-text">Internet kevi rite kaam kare?</span></button>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrapper">
        <form id="chatForm" class="input-form">
          <textarea id="userInput" class="chat-input" placeholder="Shiva ne kuch poochho..." autocomplete="off"
            rows="1"></textarea>
          <button type="submit" class="send-btn" id="sendButton">➤</button>
        </form>
        <p class="input-hint">Enter to send · Shift+Enter for new line</p>
      </div>
    </div>
  </div>

  <!-- SIDEBAR: uses display:none / display:flex (no CSS transform) -->
  <div id="sidebarOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:998;">
  </div>
  <div id="sidebar"
    style="display:none; position:fixed; top:0; left:0; bottom:0; width:280px; background:#141414; border-right:1px solid #2a2a2a; z-index:999; flex-direction:column; padding:0;">
    <div
      style="display:flex; align-items:center; justify-content:space-between; padding:0.85rem 1rem; border-bottom:1px solid #2a2a2a;">
      <span style="font-size:0.95rem; font-weight:600; color:#ececec;">💬 Chats</span>
      <button id="sidebarClose"
        style="background:none; border:none; color:#888; font-size:1.2rem; cursor:pointer; padding:4px 8px;">✕</button>
    </div>
    <div id="sidebarTabs" style="flex:1; overflow-y:auto; padding:0.5rem;"></div>
    <div style="padding:0.6rem; border-top:1px solid #2a2a2a;">
      <button id="sidebarNewChat"
        style="display:flex; align-items:center; justify-content:center; gap:0.4rem; padding:0.55rem; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:8px; color:#ececec; font-family:inherit; font-size:0.84rem; font-weight:500; cursor:pointer; width:100%;">＋
        New Chat</button>
    </div>
  </div>

  <!-- Templates -->
  <template id="userBubbleTemplate">
    <div class="msg-row msg-row--user">
      <div class="msg-bubble msg-bubble--user">
        <p></p>
      </div>
    </div>
  </template>

  <template id="aiBubbleTemplate">
    <div class="msg-row msg-row--ai">
      <div class="ai-avatar">🤓</div>
      <div class="msg-content">
        <div class="ai-text"></div>
        <div class="msg-actions hidden">
          <button class="action-btn tts-btn"><span class="tts-icon-play">🔊</span><span class="tts-icon-stop"
              style="display:none">⏹</span><span class="tts-label">Listen</span></button>
          <button class="action-btn copy-btn"><span>📋</span><span>Copy</span></button>
        </div>
      </div>
    </div>
  </template>

  <template id="loadingTemplate">
    <div class="msg-row msg-row--ai" id="loadingRow">
      <div class="ai-avatar">🤓</div>
      <div class="msg-content">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="script.js?v=3"></script>
</body>

</html>
