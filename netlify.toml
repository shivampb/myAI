[build]
  publish = "static"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/welcome"
  to = "/.netlify/functions/welcome"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
